<div id="google-dependent-content">
  <div class="section" style="border-top: 3px solid #06d6a0;">
    <div class="section-head">
      <h2 class="section-title">Calendar Selection</h2>
      <p class="section-sub">Pick the Google Calendar where tasks will be scheduled.</p>
    </div>

    <div>
      <label>Selected Calendar ID</label>
      <input name="google_calendar_id" value="{{ values.google_calendar_id }}" placeholder="primary" readonly />
    </div>

    <div style="margin-top: 16px;">
      <strong class="panel-title">Available Google calendars</strong>
      <p class="muted" style="margin-top: 4px;">Choose one calendar as the scheduling target, then click "Use selected calendar".</p>
      
      <div class="calendar-list" id="calendar-list-container" hx-trigger="load" hx-post="/action/list-calendars">
        <p class="muted" style="padding: 10px;">Loading calendars from Google...</p>
      </div>
    </div>
    
    <div class="actions" style="margin-top: 10px;">
        <button type="button" onclick="applySelectedCalendar()" style="background: #1b4965; padding: 6px 12px; font-size: 0.9rem;">Use selected calendar</button>
      </div>
    </div>
    </div>
