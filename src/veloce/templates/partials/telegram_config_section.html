<div id="telegram-dependent-content">
  <div class="section" style="border-top: 3px solid #118ab2;">
    <div class="section-head">
      <h2 class="section-title">Target Channels & Filters</h2>
      <p class="section-sub">Configure which messages are sent to the orchestrator.</p>
    </div>

    <div style="margin-top: 10px;">
      <label>Keywords</label>
      <input name="listener_keywords" placeholder="assignment, deadline, due" value="{{ values.listener_keywords }}" />
      <p class="muted" style="margin-top: 4px;">Comma-separated. Leave empty to process all messages.</p>
    </div>

    <div style="margin-top: 10px;">
      <label>Startup History Scan (Days)</label>
      <input type="number" name="startup_history_days" placeholder="0" min="0" value="{{ values.startup_history_days }}" />
      <p class="muted" style="margin-top: 4px;">How many days of history to scan when the service starts. Set to 0 to disable time-bound scan.</p>
    </div>

    <div style="margin-top: 12px;">
      <label>Active Channel List</label>
      <textarea name="telegram_channels" placeholder="Examples: @course_updates, -1001234567890">{{ values.telegram_channels }}</textarea>
    </div>

    <div class="channels" style="margin-top: 16px;">
      <strong class="panel-title">Available channels/chats</strong>
      <div id="channel-list-container" hx-trigger="load" hx-post="/action/list-channels">
        <p class="muted">Loading channels from Telegram...</p>
      </div>
    </div>

    <div style="margin-top: 12px;" class="actions">
      <button type="button" onclick="applySelectedChannels()" style="background: #1b4965; padding: 6px 12px; font-size: 0.9rem;">Add selected to Active List</button>
    </div>
  </div>
</div>
