<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Veloce</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg-1: #f1f5f9;
        --bg-2: #dbeafe;
        --card: #ffffff;
        --surface: #ffffff;
        --input-bg: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --line: #dbe4ef;
        --accent: #0369a1;
        --accent-hover: #075985;
        --success: #15803d;
        --warn: #a16207;
        --danger: #b91c1c;
        --status-bg: #e0f2fe;
        --status-text: #0c4a6e;
        --warning-bg: #fef2f2;
        --warning-line: #fecaca;
        --spinner-track: #bfdbfe;
        --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg-1: #0b1120;
          --bg-2: #13203a;
          --card: #0f172a;
          --surface: #111b31;
          --input-bg: #0b1325;
          --text: #e2e8f0;
          --muted: #94a3b8;
          --line: #24344f;
          --accent: #38bdf8;
          --accent-hover: #7dd3fc;
          --success: #4ade80;
          --warn: #facc15;
          --danger: #f87171;
          --status-bg: #082f49;
          --status-text: #bae6fd;
          --warning-bg: #3f1d1d;
          --warning-line: #7f1d1d;
          --spinner-track: #334155;
          --shadow: 0 10px 30px rgba(2, 6, 23, 0.6);
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 320px;
        min-height: 420px;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--text);
        background: linear-gradient(145deg, var(--bg-1), var(--bg-2));
      }

      .wrap {
        padding: 14px;
      }

      .tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 10px;
      }

      .tab-btn {
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--muted);
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        padding: 6px 10px;
        cursor: pointer;
      }

      .tab-btn.active {
        background: var(--accent);
        color: #ffffff;
        border-color: var(--accent);
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px;
        background: var(--card);
        box-shadow: var(--shadow);
      }

      h1 {
        margin: 0 0 6px;
        font-size: 17px;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .status-pill {
        margin-top: 10px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: var(--status-bg);
        color: var(--status-text);
        font-weight: 700;
        font-size: 11px;
        border-radius: 999px;
        padding: 5px 10px;
      }

      .schema {
        margin-top: 12px;
        display: grid;
        gap: 8px;
      }

      .row {
        display: grid;
        gap: 3px;
      }

      .label {
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .value {
        font-size: 13px;
        color: var(--text);
      }

      .confidence-badge {
        display: inline-block;
        border-radius: 999px;
        font-weight: 700;
        font-size: 11px;
        padding: 4px 10px;
      }

      .confidence-high {
        background: #dcfce7;
        color: var(--success);
      }

      .confidence-mid {
        background: #fef9c3;
        color: var(--warn);
      }

      .confidence-low {
        background: #fee2e2;
        color: var(--danger);
      }

      .warning {
        margin-top: 8px;
        border: 1px solid var(--warning-line);
        background: var(--warning-bg);
        color: var(--danger);
        border-radius: 8px;
        padding: 7px;
        font-size: 12px;
        display: none;
      }

      .loading {
        margin-top: 10px;
        display: none;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid var(--spinner-track);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .error {
        margin-top: 10px;
        font-size: 12px;
        color: var(--danger);
        display: none;
      }

      .small {
        margin-top: 10px;
        font-size: 11px;
        color: var(--muted);
      }

      .panel {
        display: none;
      }

      .panel.active {
        display: block;
      }

      .settings-grid {
        display: grid;
        gap: 10px;
        margin-top: 8px;
      }

      .field {
        display: grid;
        gap: 4px;
      }

      .field input[type="text"],
      .field input[type="url"] {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px;
        font-size: 12px;
        background: var(--input-bg);
        color: var(--text);
      }

      .field textarea {
        width: 100%;
        min-height: 88px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px;
        font-size: 12px;
        background: var(--input-bg);
        color: var(--text);
        font-family: inherit;
      }

      .secondary-btn {
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--text);
        font-weight: 700;
        border-radius: 9px;
        padding: 9px 10px;
        font-size: 12px;
        cursor: pointer;
      }

      .secondary-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .switch {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px;
      }

      .save-btn {
        border: none;
        background: var(--accent);
        color: #ffffff;
        font-weight: 700;
        border-radius: 9px;
        padding: 9px 10px;
        font-size: 12px;
        cursor: pointer;
      }

      .save-btn:hover {
        background: var(--accent-hover);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="tabs">
        <button class="tab-btn active" id="resultTabBtn" type="button">Result</button>
        <button class="tab-btn" id="settingsTabBtn" type="button">Settings</button>
      </div>

      <div class="panel active" id="resultPanel">
        <div class="card">
          <h1>AI Output</h1>
          <p>Mapped from the strict schema returned by your backend.</p>
          <div class="status-pill" id="statusPill">Idle</div>

          <div class="loading" id="loadingState">
            <span class="spinner"></span>
            <span>Processing with GLM...</span>
          </div>

          <div class="error" id="errorState"></div>

          <div class="schema">
            <div class="row">
              <span class="label">Title</span>
              <span class="value" id="fieldTitle">-</span>
            </div>
            <div class="row">
              <span class="label">Date</span>
              <span class="value" id="fieldDate">-</span>
            </div>
            <div class="row">
              <span class="label">Time</span>
              <span class="value" id="fieldTime">-</span>
            </div>
            <div class="row">
              <span class="label">Confidence</span>
              <span class="confidence-badge confidence-mid" id="fieldConfidence">-</span>
              <div class="warning" id="clarificationWarning">Needs Clarification</div>
            </div>
            <div class="row">
              <span class="label">Message</span>
              <span class="value" id="fieldMessage">-</span>
            </div>
          </div>

          <div class="small" id="lastPayload">No payload captured yet.</div>
        </div>
      </div>

      <div class="panel" id="settingsPanel">
        <div class="card">
          <h1>Settings</h1>
          <p>Control scraping behavior and backend endpoint.</p>
          <div class="settings-grid">
            <label class="switch" for="autoDetectToggle">
              <span>Auto-Detect Mode</span>
              <input id="autoDetectToggle" type="checkbox" />
            </label>

            <label class="field" for="userIdInput">
              <span class="label">User ID</span>
              <input id="userIdInput" type="text" placeholder="anonymous" />
            </label>

            <label class="field" for="webhookUrlInput">
              <span class="label">n8n Webhook URL</span>
              <input id="webhookUrlInput" type="url" placeholder="https://..." />
            </label>

            <label class="field" for="promptInput">
              <span class="label">AI Prompt / Instructions</span>
              <textarea id="promptInput" placeholder="Example: Extract only actionable tasks, preserve deadlines, and summarize the request clearly."></textarea>
            </label>

            <button class="secondary-btn" id="resetSettingsBtn" type="button">Reset to Default</button>

            <button class="save-btn" id="saveSettingsBtn" type="button">Save Settings</button>
            <div class="small" id="saveStatus">Changes are persisted in local storage.</div>
          </div>
        </div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
